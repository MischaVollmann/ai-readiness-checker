<!--
  TYPO3 Einbettung: Quanos AI Readiness Checker
  ================================================
  Diesen Code in ein TYPO3-Inhaltselement vom Typ "HTML" einfuegen.
  Pfad im Backend: Inhalt > Neu > HTML

  WICHTIG: Ersetzen Sie die URL in "src" mit der tatsaechlichen URL,
  unter der index.html gehostet wird (z.B. GitHub Pages, eigener Webserver).
-->

<iframe
  src="https://IHRE-DOMAIN.de/ai-readiness-checker/index.html"
  width="100%"
  height="900"
  style="border: none; display: block;"
  title="Quanos AI Readiness Checker"
  loading="lazy"
  allow="clipboard-write"
></iframe>

<script>
  /* Automatische Hoehenanpassung (optional, falls Same-Origin) */
  (function () {
    var iframe = document.querySelector('iframe[title="Quanos AI Readiness Checker"]');
    if (!iframe) return;
    iframe.addEventListener('load', function () {
      try {
        var body = iframe.contentWindow.document.body;
        var html = iframe.contentWindow.document.documentElement;
        var height = Math.max(
          body.scrollHeight, body.offsetHeight,
          html.clientHeight, html.scrollHeight, html.offsetHeight
        );
        iframe.style.height = height + 'px';
      } catch (e) {
        /* Cross-Origin: feste Hoehe bleibt bestehen */
      }
    });
  })();
</script>
